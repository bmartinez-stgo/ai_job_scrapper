apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "job-scraper.app.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "job-scraper.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "job-scraper.app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "job-scraper.app.selectorLabels" . | nindent 8 }}
    spec:
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: job-scraper-app-data
      containers:
        - name: app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
          envFrom:
            - configMapRef:
                name: job-scraper-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: job-scraper-app-secrets
                  key: SECRET_KEY
            - name: GMAIL_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: job-scraper-app-secrets
                  key: GMAIL_APP_PASSWORD
                  optional: true
          volumeMounts:
            - name: app-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
      {{- with .Values.app.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
