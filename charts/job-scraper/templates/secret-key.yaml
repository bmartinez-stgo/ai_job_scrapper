{{- $existing := lookup "v1" "Secret" .Values.namespace "job-scraper-app-secrets" }}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: job-scraper-app-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "job-scraper.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  SECRET_KEY: {{ randAlphaNum 32 | b64enc | quote }}
  GMAIL_APP_PASSWORD: ""
{{- end }}
